services:
  foto-splitter:
    image: ghcr.io/dernassesmart/foto-splitter:latest
    container_name: foto-splitter
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Passe diese Pfade an deine Synology-Ordner an:
      - /volume1/scan/scan-eingang:/data/input
      - /volume1/scan/scan-ausgang:/data/output
    environment:
      - PROMINENCE=46
      - PADDING=0
      - ROTATION=0
    # Optional: auf bestimmte CPU-Kerne begrenzen
    # cpus: "1.0"
    # mem_limit: 512m
